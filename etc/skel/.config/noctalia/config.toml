[bar.default]
background_opacity = 0.89999997988343239
center = [ "workspaces", "Spacer_2", "media" ]
end = [
    "tray",
    "Spacer_2",
    "notifications",
    "clipboard",
    "recorder",
    "Spacer_2",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "Spacer_2",
    "date",
    "clock",
    "Spacer_2",
    "session",
    "Spacer"
]
margin_edge = 0
margin_ends = 0
radius_bottom_left = -30
radius_bottom_right = -30
radius_top_left = 0
radius_top_right = 0
start = [ "Spacer", "launcher", "Spacer_2", "active_window" ]
thickness = 40

[wallpaper.default]
path = "/usr/share/wallpapers/cachyos-wallpapers/cachysurf4.jpg"

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@DP-2", "lockscreen-login-box@DP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-2"]
    box_height = 70.0
    box_width = 400.0
    cx = 1280.0
    cy = 1321.0
    output = "DP-2"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-2".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugin_settings."leo/game-launcher"]
browser_placement = "attached"

[plugin_settings."noctalia/screen_recorder"]
restore_portal = true

[plugin_settings."yogaeru/mango_layout"]
main_placement = "attached"

[plugins]
enabled = [ "noctalia/screen_recorder", "leo/game-launcher", "yogaeru/mango_layout", "noctalia/wallhaven" ]

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/official-plugins"
    name = "official"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/noctalia-dev/community-plugins"
    name = "community"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/Ahmed5Emad/Gamelauncher-Noctalia"
    name = "game-launcher"

    [[plugins.source]]
    kind = "git"
    location = "https://github.com/yogaeru/noctalia-plugins"
    name = "yogaeru"

[shell]
polkit_agent = true
settings_show_advanced = true

[theme]
builtin = "Noctalia"
mode = "dark"
source = "wallpaper"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme", "qt" ]

[theme]
builtin = "Noctalia"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

[widget.Spacer]
length = 10
type = "spacer"

[widget.Spacer_2]
type = "spacer"

[widget.date]
format = "{:%a %d %b -}"

[widget.launcher]
custom_image = "/usr/share/noctalia/assets/images/distros/cachy.svg"
scale = 1.45

[widget.launcher_2]
type = "leo/game-launcher:launcher"

[widget.network]
show_label = false

[widget.picker]
type = "yogaeru/mango_layout:picker"

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.workspaces]
anchor = true
display = "none"
